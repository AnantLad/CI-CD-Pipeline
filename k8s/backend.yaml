apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: anantlad28/aj_store:backend
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          env:
            - name: MONGO_URL
              value: ${{secrets.MONGODB_URI}}

---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - port: 4000
      targetPort: 4000