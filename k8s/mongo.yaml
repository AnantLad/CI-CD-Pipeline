apiVersion: apps/v1
kind: services
metadata:
  name: mongo
spec:
  selector:
    app: mongo
  ports:
    - port: 27017
  clusterIP: None
---
apiVersion: apps/v1 
kind: StatefulSet
metadata:
  name: mongo
spec:
  serviceName: "mongo"
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
      spec:
        containers:
          - name: mongo
            image: anantlad28/aj_store:mongo
            ports:
              - containerPort: 27017
            volumeMounts:
              - name: mongo-data
                mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi